document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n  <div style=\"position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:13px 26px;background:rgba(10,14,20,.82);backdrop-filter:blur(12px);border-bottom:1px solid #1b2230;font-family:'IBM Plex Mono',monospace\">\n    <div style=\"display:flex;align-items:center;gap:13px;min-width:0\">\n      <div style=\"width:8px;height:8px;border-radius:50%;background:#3fd964;box-shadow:0 0 10px #3fd964;animation:pulseDot 2.4s ease-in-out infinite\"><\u002Fdiv>\n      <span style=\"color:#eaf0f8;font-weight:600;letter-spacing:.6px;font-size:13px\">CESCP // DAY 4<\u002Fspan>\n      <span style=\"color:#3a4659\">/<\u002Fspan>\n      <span style=\"color:#6f7c91;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">Modules 11–12 · Secure Comms &amp; OTA<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:12px;align-items:center;font-size:11px;color:#6f7c91;white-space:nowrap\">\n      <span style=\"color:#4493f8\">node: pico-wh-01<\u002Fspan>\n      <span style=\"color:#2b3647\">|<\u002Fspan>\n      <span>LINK MONITOR<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================================================ HUB ============================================================ -->\n  <sc-if value=\"{{ isHub }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"max-width:1080px;margin:0 auto;padding:54px 26px 90px\">\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:3px;color:#3fd964;margin-bottom:16px\">SECURE EMBEDDED COMMUNICATIONS<\u002Fdiv>\n    <h1 style=\"font-size:46px;line-height:1.05;margin:0 0 18px;color:#eaf0f8;font-weight:700;letter-spacing:-1px;max-width:780px;text-wrap:balance\">Five doors a small device has to lock.<\u002Fh1>\n    <p style=\"font-size:17px;line-height:1.6;color:#9aa7ba;max-width:700px;margin:0 0 30px\">Every link your device uses is a doorway in, and the update path can rewrite the whole device. Each one needs the same three things — <span style=\"color:#eaf0f8\">a verified identity<\u002Fspan>, <span style=\"color:#eaf0f8\">a private message<\u002Fspan>, and <span style=\"color:#eaf0f8\">a check that what arrives is genuine<\u002Fspan>. Pick a stop to step through it on your own bench.<\u002Fp>\n\n    <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:46px\">\n      <div style=\"display:flex;align-items:center;gap:9px;padding:9px 15px;border:1px solid #233044;border-radius:999px;background:#0e1320;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#cdd8e8\"><span style=\"color:#4493f8\">01<\u002Fspan> Verify identity<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;padding:9px 15px;border:1px solid #233044;border-radius:999px;background:#0e1320;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#cdd8e8\"><span style=\"color:#4493f8\">02<\u002Fspan> Keep it private<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;padding:9px 15px;border:1px solid #233044;border-radius:999px;background:#0e1320;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#cdd8e8\"><span style=\"color:#4493f8\">03<\u002Fspan> Refuse stale, forged or tampered input<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- THE BENCH -->\n    <div style=\"border:1px solid #1d2735;border-radius:12px;background:linear-gradient(180deg,#0e131d,#0b0f17);padding:24px;margin-bottom:46px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:18px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2px;color:#6f7c91\">YOUR BENCH · THE TARGET NODE<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#3fd964\">● assembled &amp; powered<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:center;gap:14px\">\n        <div>\n          <div style=\"border:1px solid #232f40;border-radius:9px;background:#070a0f;height:170px;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px\"><img src=\"b4271bfb-a6aa-40e7-8d64-b28d2209fd87\" alt=\"Maker Pi Pico base\" style=\"max-width:100%;max-height:100%;object-fit:contain;border-radius:4px\"><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#cdd8e8;margin-top:9px\">Maker Pi Pico<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#6f7c91;line-height:1.4\">Carrier base — power, ports, breakout<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:24px;color:#3a4659;font-family:'IBM Plex Mono',monospace;text-align:center\">+<\u002Fdiv>\n        <div>\n          <div style=\"border:1px solid #232f40;border-radius:9px;background:#070a0f;height:170px;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px\"><img src=\"1458b627-6375-4048-97c0-5822279e39c4\" alt=\"Raspberry Pi Pico WH\" style=\"max-width:100%;max-height:100%;object-fit:contain\"><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#cdd8e8;margin-top:9px\">Raspberry Pi Pico WH<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#6f7c91;line-height:1.4\">The brain — Wi-Fi radio, seats onto the base<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:24px;color:#3a4659;font-family:'IBM Plex Mono',monospace;text-align:center\">+<\u002Fdiv>\n        <div>\n          <div style=\"border:1px solid #232f40;border-radius:9px;background:#070a0f;height:170px;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px\"><img src=\"5b088978-cca2-4248-8d36-ce1432ec122a\" alt=\"Debug Probe\" style=\"max-width:100%;max-height:100%;object-fit:contain;border-radius:4px\"><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#cdd8e8;margin-top:9px\">Debug Probe<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#6f7c91;line-height:1.4\">Clips to the Pico's DEBUG pins for flashing &amp; watching<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2px;color:#6f7c91;margin-bottom:16px\">MODULE 11 · FOUR CHANNELS TO DEFEND<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:30px\">\n\n      <div onclick=\"{{ goTls }}\" style=\"cursor:pointer;border:1px solid #1d2735;border-radius:12px;background:#0b0f17;padding:22px;transition:transform .15s,border-color .15s,box-shadow .15s\" style-hover=\"cursor:pointer;border:1px solid #3fd964;border-radius:12px;background:linear-gradient(180deg,#11231a,#0c1712);padding:22px;transform:translateY(-3px);box-shadow:0 14px 36px -16px #3fd96455\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:600;color:#3fd964;line-height:1\">01<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.5px;color:#6f7c91;white-space:nowrap\">ENTER →<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:22px;font-weight:700;color:#eaf0f8;margin-bottom:3px\">TLS<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#7fae93;margin-bottom:11px\">Transport Layer Security · device → cloud<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.5;color:#9aa7ba;margin:0\">Wraps the connection so the gateway proves who it is and nobody on the wire can read or forge your data.<\u002Fp>\n      <\u002Fdiv>\n\n      <div onclick=\"{{ goMqtt }}\" style=\"cursor:pointer;border:1px solid #1d2735;border-radius:12px;background:#0b0f17;padding:22px;transition:transform .15s,border-color .15s,box-shadow .15s\" style-hover=\"cursor:pointer;border:1px solid #4493f8;border-radius:12px;background:linear-gradient(180deg,#0e1a2b,#0b0f17);padding:22px;transform:translateY(-3px);box-shadow:0 14px 36px -16px #4493f855\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:600;color:#4493f8;line-height:1\">02<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.5px;color:#6f7c91;white-space:nowrap\">ENTER →<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:22px;font-weight:700;color:#eaf0f8;margin-bottom:3px\">MQTT<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#7e95b5;margin-bottom:11px\">Message Queuing Telemetry Transport<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.5;color:#9aa7ba;margin:0\">Lightweight publish / subscribe through a central broker. Who is allowed to grab the microphone?<\u002Fp>\n      <\u002Fdiv>\n\n      <div onclick=\"{{ goCan }}\" style=\"cursor:pointer;border:1px solid #1d2735;border-radius:12px;background:#0b0f17;padding:22px;transition:transform .15s,border-color .15s,box-shadow .15s\" style-hover=\"cursor:pointer;border:1px solid #e0a64d;border-radius:12px;background:linear-gradient(180deg,#1d160a,#0b0f17);padding:22px;transform:translateY(-3px);box-shadow:0 14px 36px -16px #e0a64d55\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:600;color:#e0a64d;line-height:1\">03<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.5px;color:#6f7c91;white-space:nowrap\">ENTER →<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:22px;font-weight:700;color:#eaf0f8;margin-bottom:3px\">CAN<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#b59560;margin-bottom:11px\">Controller Area Network · control bus<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.5;color:#9aa7ba;margin:0\">A fast shared bus for vehicles and machines — built for speed, and it trusts every sender by default.<\u002Fp>\n      <\u002Fdiv>\n\n      <div onclick=\"{{ goRf }}\" style=\"cursor:pointer;border:1px solid #1d2735;border-radius:12px;background:#0b0f17;padding:22px;transition:transform .15s,border-color .15s,box-shadow .15s\" style-hover=\"cursor:pointer;border:1px solid #9d8cff;border-radius:12px;background:linear-gradient(180deg,#15122b,#0b0f17);padding:22px;transform:translateY(-3px);box-shadow:0 14px 36px -16px #9d8cff55\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:600;color:#9d8cff;line-height:1\">04<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.5px;color:#6f7c91;white-space:nowrap\">ENTER →<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:22px;font-weight:700;color:#eaf0f8;margin-bottom:3px\">RF<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#9285c4;margin-bottom:11px\">Radio Frequency · Wi-Fi · BLE · Zigbee · LoRaWAN<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.5;color:#9aa7ba;margin:0\">Wireless doors that open to anyone in range — an attacker never has to touch the board.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2px;color:#6f7c91;margin-bottom:16px\">MODULE 12 · SHIP FIXES WITHOUT LOSING TRUST<\u002Fdiv>\n    <div onclick=\"{{ goOta }}\" style=\"cursor:pointer;border:1px solid #1d2735;border-radius:12px;background:#0b0f17;padding:22px;display:flex;align-items:center;gap:22px;transition:transform .15s,border-color .15s,box-shadow .15s\" style-hover=\"cursor:pointer;border:1px solid #44 tyle=\"cursor:pointer;display:inline-flex;align-items:center;gap:7px;margin-top:13px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.5px;color:#7e95b5;border:1px dashed #2b3a52;border-radius:7px;padding:7px 12px;background:#0a1018\" style-hover=\"cursor:pointer;display:inline-flex;align-items:center;gap:7px;margin-top:13px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.5px;color:#9bc0ee;border:1px dashed #3a5276;border-radius:7px;padding:7px 12px;background:#0d1626\"><span style=\"font-size:13px\">?<\u002Fspan> reveal a hint<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ q.hintShown }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:13px;border-left:2px solid #3a5276;border-radius:0 8px 8px 0;background:#0c1422;padding:11px 15px\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;color:#5e86b8;display:block;margin-bottom:5px\">HINT<\u002Fspan><div style=\"font-size:13.5px;line-height:1.6;color:#a9c0db\">{{ q.hint }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ q.answered }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"{{ q.fbStyle }}\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;{{ q.fbLabelStyle }}\">{{ q.fbLabel }}<\u002Fspan><div style=\"font-size:13.5px;line-height:1.6;color:#bcc8d8;margin-top:6px\">{{ q.fb }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- footer -->\n    <div style=\"border-top:1px solid #1b2230;padding-top:26px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px\">\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.5px;color:#3fd964;margin-bottom:5px\">✓ STOP {{ chNum }} COMPLETE<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#9aa7ba;max-width:520px;line-height:1.5\">Same three rules every time: prove identity, keep it private, refuse anything that isn't genuine.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:11px\">\n        <div onclick=\"{{ goHub }}\" style=\"cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#9aa7ba;padding:11px 18px;border-radius:8px;border:1px solid #2b3647\" style-hover=\"cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#eaf0f8;padding:11px 18px;border-radius:8px;border:1px solid #3a4659;background:#11161f\">← bench<\u002Fdiv>\n        <div onclick=\"{{ chNext }}\" style=\"cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#0a0e14;background:#3fd964;padding:11px 18px;border-radius:8px;font-weight:600\" style-hover=\"cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#0a0e14;background:#5fe87f;padding:11px 18px;border-radius:8px;font-weight:600\">{{ chNextLabel }} →<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:760},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showScanlines&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;terminalSpeed&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Normal&quot;,&quot;options&quot;:[&quot;Slow&quot;,&quot;Normal&quot;,&quot;Fast&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen:'hub', secure:false, termStep:0, termRunning:false, openEl:0, quiz:{}, hints:{}, ready:false };\n\n  // deterministic Fisher-Yates so option order is stable per render but not always position 1\n  permute(n, seed){\n    const arr = Array.from({length:n}, (_,i)=>i);\n    let s = (seed>>>0) || 1;\n    for(let i=n-1;i>0;i--){ s=(s*1103515245+12345)>>>0; const j=s%(i+1); const t=arr[i]; arr[i]=arr[j]; arr[j]=t; }\n    return arr;\n  }\n  seedFor(screen, i){ let h=i*131+7; for(let k=0;k<screen.length;k++) h=(h*31+screen.charCodeAt(k))>>>0; return h; }\n\n  componentDidMount(){\n    const get = ()=> (window.CESCP_CHANNELS_A && window.CESCP_CHANNELS_B)\n      ? { ...window.CESCP_CHANNELS_A, ...window.CESCP_CHANNELS_B } : null;\n    const merged = get();\n    if(merged){ this.CH = merged; this.setState({ready:true}); return; }\n    // helmet data scripts may still be loading — poll briefly\n    let n = 0;\n    this._dataPoll = setInterval(()=>{\n      const m = get();\n      if(m){ clearInterval(this._dataPoll); this._dataPoll=null; this.CH=m; this.setState({ready:true}); }\n      else if(++n > 150){ clearInterval(this._dataPoll); this._dataPoll=null; console.error('channel data failed to load'); }\n    }, 40);\n  }\n\n  speed(){ const m={Slow:1300,Normal:850,Fast:450}; return m[this.props.terminalSpeed]||850; }\n\n  go(s){\n    if(this._t){clearInterval(this._t);this._t=null;}\n    const ai = (this.CH && this.CH[s]) ? this.CH[s].accentIndex : 0;\n    this.setState({screen:s, secure:false, termStep:0, termRunning:false, openEl:ai, quiz:{}, hints:{}});\n    try{window.scrollTo(0,0);}catch(e){}\n  }\n\n  runTerm(){\n    const ch = this.CH && this.CH[this.state.screen];\n    if(!ch) return;\n    if(this._t) clearInterval(this._t);\n    this.setState({termStep:0, termRunning:true});\n    const iv = this.speed(); const N = ch.term.length;\n    this._t = setInterval(()=>{ this.setState(s=>{ const n=s.termStep+1; if(n>=N){clearInterval(this._t);this._t=null;return{termStep:N,termRunning:false};} return {termStep:n}; }); }, iv);\n  }\n  resetTerm(){ if(this._t){clearInterval(this._t);this._t=null;} this.setState({termStep:0,termRunning:false}); }\n  componentWillUnmount(){ if(this._t)clearInterval(this._t); if(this._dataPoll)clearInterval(this._dataPoll); }\n\n  renderVals(){\n    const screen = this.state.screen;\n    const isHub = screen==='hub';\n    const ready = this.state.ready;\n    const nav = {\n      isHub, scanlines:(this.props.showScanlines ?? true),\n      goHub:()=>this.go('hub'), goTls:()=>this.go('tls'), goMqtt:()=>this.go('mqtt'),\n      goCan:()=>this.go('can'), goRf:()=>this.go('rf'), goOta:()=>this.go('ota')\n    };\n    if(isHub || !ready || !this.CH || !this.CH[screen]){\n      return { ...nav, isStation:false, loading: !isHub && !ready };\n    }\n\n    const ch = this.CH[screen];\n    const secure = this.state.secure;\n    const reduceMotion = this.props.reduceMotion ?? false;\n    const EXPAND = {tls:'Transport Layer Security', mqtt:'Message Queuing Telemetry Transport', can:'Controller Area Network', rf:'Wireless radios', ota:'Over-the-Air updates'};\n\n    const termVisible = ch.term.slice(0, this.state.termStep).map(l=>({\n      gutter:l.gutter, text:l.t, note:l.n,\n      gutterStyle:`color:${l.gc};font-weight:600`, textStyle:`color:${l.tc}`\n    }));\n\n    const elements = ch.elements.map((e,i)=>{\n      const open = i===this.state.openEl;\n      const accent = i===ch.accentIndex;\n      const acol = accent ? '#ff8f6b' : '#4493f8';\n      const border = open ? (accent?'#5a3322':'#2b3a52') : '#1d2735';\n      const bg = open ? (accent?'#170f0b':'#0c121d') : '#0b0f17';\n      return { num:'0'+(i+1), name:e.name, role:e.role, value:e.value, sig:e.sig, plain:e.plain, isOpen:open,\n        cardStyle:`border:1px solid ${border};border-radius:11px;background:${bg};overflow:hidden;transition:border-color .15s`,\n        numStyle:`color:${acol};font-weight:600`, chev: open?'\\u2212':'+', chevStyle:`color:${open?acol:'#6f7c91'}`,\n        open:()=>this.setState({openEl:i}) };\n    });\n\n    const quiz = this.state.quiz;\n    const hintsState = this.state.hints;\n    const LETTERS = ['A','B','C','D','E','F'];\n    const questions = ch.questions.map((q,i)=>{\n      const order = this.permute(q.opts.length, this.seedFor(screen, i));   // displayed -> original index\n      const correctDisplay = order.indexOf(q.correct);\n      const a = quiz['q'+i]; const answered = a!==undefined; const isRight = answered && a===correctDisplay;\n      const hintShown = !!hintsState['q'+i];\n      return { qnum:i+1, q:q.q, fb:q.fb, answered, hint:q.hint||'',\n        hintShown, hintHidden: !hintShown && !answered,\n        showHint:()=>this.setState(s=>({hints:{...s.hints,['q'+i]:true}})),\n        fbStyle:`margin-top:14px;border-radius:8px;padding:13px 15px;background:${isRight?'#0b1611':'#160d0f'};border:1px solid ${isRight?'#1f4a2e':'#4a2326'}`,\n        fbLabel: isRight?'\\u2713 CORRECT':'\\u2717 NOT QUITE', fbLabelStyle:`color:${isRight?'#7fdf9b':'#ff8f8f'}`,\n        options: order.map((origIdx, di)=>{\n          const t = q.opts[origIdx];\n          let border='#2b3647', bg='#0a0e16', color='#c4cfde', mark=LETTERS[di], markColor='#56627a';\n          if(answered){\n            if(di===correctDisplay){ border='#2c6b41'; bg='#0e1c14'; color='#bfe0c9'; mark='\\u2713'; markColor='#3fd964'; }\n            else if(di===a){ border='#6b2a2c'; bg='#1c1011'; color='#e0a5a5'; mark='\\u2717'; markColor='#ff5d5d'; }\n            else { border='#1d2735'; bg='#0a0e16'; color='#5c6677'; mark=LETTERS[di]; markColor='#3a4659'; }\n          }\n          return { text:t, mark, markStyle:`color:${markColor};font-weight:600`,\n            optStyle:`cursor:pointer;display:flex;align-items:flex-start;gap:10px;font-size:14px;line-height:1.5;color:${color};border:1px solid ${border};background:${bg};border-radius:8px;padding:11px 14px;transition:all .12s`,\n            pick:()=>{ if(this.state.quiz['q'+i]===undefined) this.setState(s=>({quiz:{...s.quiz,['q'+i]:di}})); } };\n        }) };\n    });\n\n    const chWhat = ch.what.map((w,i)=>({ n:(i+1)+'.', bold:w.bold, rest:w.rest }));\n\n    // TLS packets\n    const pktAnim = reduceMotion ? 'none' : 'flowRight 3.6s linear infinite';\n    const pktColor = secure?'#3fd964':'#ff5d5d', pktBg=secure?'#0e2417':'#2a1012', pktBorder=secure?'#2c6b41':'#6b2a2c';\n    const pktBase = `font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:${pktColor};background:${pktBg};border:1px solid ${pktBorder};border-radius:4px;padding:3px 7px;white-space:nowrap;animation:${pktAnim}`;\n    // RF rings\n    const ringAnim = reduceMotion ? 'none' : 'pulseRing 2.4s ease-out infinite';\n    const ringBase = `position:absolute;left:50%;top:50%;width:84px;height:84px;border-radius:50%;border:2px solid ${secure?'#3fd96466':'#ff5d5d66'};animation:${ringAnim}`;\n\n    return {\n      ...nav, isStation:true, loading:false,\n      chNum:ch.num, chCode:ch.code, chKicker:ch.kicker, chExpand:EXPAND[screen]||'', chSub:ch.sub,\n      chWhat, chAnalogyMain:ch.analogyMain, chAnalogyKey:ch.analogyKey,\n      chDiagTitle:ch.diagTitle, chDiagSub:ch.diagSub,\n      chToggleOff:ch.toggleOff, chToggleOn:ch.toggleOn,\n      readoutOffCode:ch.readoutOff.code, readoutOffNote:ch.readoutOff.note,\n      readoutOnCode:ch.readoutOn.code, readoutOnNote:ch.readoutOn.note,\n      chTermKicker:ch.termKicker, chTermTitle:ch.termTitle, chTermSub:ch.termSub, chTermLabel:'pico-wh-01 \\u2014 '+ch.code.toLowerCase(),\n      chElTitle:ch.elTitle, chElIntro:ch.elIntro,\n      chSqueezeTitle:ch.squeezeTitle, chSqueezeSub:ch.squeezeSub, chConstraints:ch.constraints, chFixes:ch.fixes,\n      chNextLabel:ch.nextLabel, chNext:()=>this.go(ch.next),\n      secure, secureOff:!secure, secureOn:secure,\n      isTls:screen==='tls', isMqtt:screen==='mqtt', isCan:screen==='can', isRf:screen==='rf', isOta:screen==='ota',\n      setSecureOn:()=>this.setState({secure:true}), setSecureOff:()=>this.setState({secure:false}),\n      termVisible, termEmpty:this.state.termStep===0, runTerm:()=>this.runTerm(), resetTerm:()=>this.resetTerm(),\n      elements, questions,\n      packetText: secure?'\\u25cf\\u25cf\\u25cf\\u25cf\\u25cf':'TEMP=21.4',\n      packetStyle1: pktBase+';animation-delay:0s', packetStyle2: pktBase+';animation-delay:-1.2s', packetStyle3: pktBase+';animation-delay:-2.4s',\n      lockBadgeText: secure?'\\u25cf ENCRYPTED':'\\u26a0 PLAINTEXT',\n      lockBadgeStyle: secure?'color:#3fd964;background:#0e2417;border:1px solid #2c6b41;border-radius:4px;padding:2px 7px':'color:#ff5d5d;background:#2a1012;border:1px solid #6b2a2c;border-radius:4px;padding:2px 7px',\n      tapDotStyle: secure?'background:#3fd964;box-shadow:0 0 8px #3fd96488':'background:#ff5d5d;box-shadow:0 0 10px #ff5d5d;animation:pulseDot 1.3s infinite',\n      tapLineColor: secure?'#2c6b41':'#ff5d5d',\n      ringStyle1: ringBase+';animation-delay:0s', ringStyle2: ringBase+';animation-delay:-.8s', ringStyle3: ringBase+';animation-delay:-1.6s',\n      gatewayStyle: secure?'border:1px solid #2c6b41;background:#0b1611;color:#7fdf9b':'border:1px solid #233044;background:#0b1018;color:#cdd8e8'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
